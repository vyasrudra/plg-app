<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLG — Lead Generator Testing</title>
    <meta name="description" content="Internal testing UI for the Personalised Lead Generator pipeline.">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #e2e8f0;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
            outline: none;
        }
        .input-field::placeholder { color: rgba(148, 163, 184, 0.6); }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }
        .btn-primary:active { transform: translateY(0); }
        .result-box {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
        }
        .error-box {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
        }
        .pulse-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #818cf8;
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .htmx-request .btn-text { display: none; }
        .htmx-request .btn-loading { display: inline-flex !important; }
        .btn-loading { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4 px-3 py-1.5 rounded-full" style="background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.2);">
                <div class="pulse-dot"></div>
                <span class="text-indigo-300 text-xs font-medium tracking-wide uppercase">System Online</span>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">PLG Lead Generator</h1>
            <p class="text-gray-400 text-sm">Enter a prospect's company info to generate 50 hyper-qualified leads.</p>
        </div>

        <!-- Form Card -->
        <div class="glass-card p-6 mb-4">
            <form hx-post="/generate-leads"
                  hx-target="#result"
                  hx-indicator="#submit-btn"
                  hx-headers='{"Content-Type": "application/json"}'
                  hx-ext="json-enc"
                  id="lead-form">

                <div class="space-y-4">
                    <div>
                        <label for="company_name" class="block text-sm font-medium text-gray-300 mb-1.5">Company Name</label>
                        <input type="text" name="company_name" id="company_name"
                               class="input-field w-full px-4 py-3 text-sm"
                               placeholder="e.g. Acme Marketing Co" required>
                    </div>

                    <div>
                        <label for="website" class="block text-sm font-medium text-gray-300 mb-1.5">Website</label>
                        <input type="url" name="website" id="website"
                               class="input-field w-full px-4 py-3 text-sm"
                               placeholder="https://acmemarketing.com" required>
                    </div>

                    <div>
                        <label for="lead_name" class="block text-sm font-medium text-gray-300 mb-1.5">Lead Name <span class="text-gray-500">(optional)</span></label>
                        <input type="text" name="lead_name" id="lead_name"
                               class="input-field w-full px-4 py-3 text-sm"
                               placeholder="Jane Doe">
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                        class="btn-primary w-full mt-6 px-6 py-3.5 text-sm flex items-center justify-center gap-2">
                    <span class="btn-text">🚀 Generate Leads</span>
                    <span class="btn-loading items-center gap-2">
                        <span class="spinner"></span>
                        <span>Generating…</span>
                    </span>
                </button>
            </form>
        </div>

        <!-- Result -->
        <div id="result"></div>

        <!-- Footer -->
        <p class="text-center text-gray-600 text-xs mt-6">PLG v1.0 — Internal QA Tool</p>
    </div>

    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script>
        document.addEventListener('htmx:afterRequest', function(e) {
            const result = document.getElementById('result');
            if (e.detail.successful) {
                try {
                    const data = JSON.parse(e.detail.xhr.responseText);
                    if (data.status === 'complete' && data.sheet_url) {
                        result.innerHTML = `
                            <div class="result-box p-4">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-green-400 text-lg">✅</span>
                                    <span class="text-green-300 font-semibold text-sm">Leads Generated!</span>
                                </div>
                                <p class="text-gray-300 text-sm mb-2">${data.leads_count} leads in ${data.took_seconds}s</p>
                                <a href="${data.sheet_url}" target="_blank"
                                   class="inline-block text-indigo-400 hover:text-indigo-300 text-sm underline">
                                    Open Google Sheet →
                                </a>
                            </div>`;
                    } else {
                        result.innerHTML = `
                            <div class="result-box p-4">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-yellow-400">⏳</span>
                                    <span class="text-yellow-300 font-semibold text-sm">Pipeline scaffold — no leads yet</span>
                                </div>
                                <p class="text-gray-400 text-xs">Job ${data.job_id} completed in ${data.took_seconds}s. Pipeline services will be connected next.</p>
                            </div>`;
                    }
                } catch(err) {
                    result.innerHTML = `<div class="error-box p-4"><span class="text-red-300 text-sm">Unexpected response format.</span></div>`;
                }
            } else {
                result.innerHTML = `<div class="error-box p-4"><span class="text-red-300 text-sm">❌ Request failed. Check server logs.</span></div>`;
            }
        });
    </script>
</body>
</html>
